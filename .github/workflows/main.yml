name: Build EXE
on: [push]
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - name: Build with PKG
        run: npx pkg ./src/index.ts --targets node18-win-x64 --output MyBot.exe
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MyBot-Exe
          path: MyBot.exe
